<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
  <title>UCwOrship</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111;
      color: #eee;
      font-family: system-ui, sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background: #1a1a1a;
      border-bottom: 1px solid #2a2a2a;
      flex-shrink: 0;
    }

    #song-title {
      font-size: 15px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      text-align: center;
      padding: 0 10px;
    }

    .logo {
      font-size: 11px;
      color: #555;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      flex-shrink: 0;
    }

    /* ── Live dot ── */
    #conn-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #444;
      flex-shrink: 0;
      transition: background 0.4s;
    }
    #conn-dot.live { background: #4caf82; }

    /* ── Song image ── */
    #slide-wrap {
      flex: 1;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      overflow-y: auto;
      padding: 12px 8px;
    }

    #slide-img {
      width: 100%;
      max-width: 900px;
      height: auto;
      display: block;
      border-radius: 6px;
    }

    /* ── Idle / waiting screen ── */
    #idle-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      color: #444;
      text-align: center;
      padding: 40px 20px;
    }

    #idle-screen .icon { font-size: 52px; }
    #idle-screen p { font-size: 15px; }
  </style>
</head>
<body>

<div id="header">
  <span class="logo">UCwOrship</span>
  <div id="song-title">Connecting…</div>
  <div id="conn-dot"></div>
</div>

<div id="slide-wrap" style="display:none">
  <img id="slide-img" src="" alt="Song slide">
</div>

<div id="idle-screen">
  <div class="icon">🎵</div>
  <p>Waiting for the worship leader to select a song…</p>
</div>

<script>
const titleEl  = document.getElementById("song-title");
const dot      = document.getElementById("conn-dot");
const slideWrap = document.getElementById("slide-wrap");
const slideImg  = document.getElementById("slide-img");
const idleScreen = document.getElementById("idle-screen");

function showSlide(title, b64) {
  titleEl.textContent = title || "UCwOrship";
  if (b64) slideImg.src = "data:image/jpeg;base64," + b64;
  slideWrap.style.display = "flex";
  idleScreen.style.display = "none";
}

function showIdle() {
  titleEl.textContent = "UCwOrship";
  slideWrap.style.display = "none";
  idleScreen.style.display = "flex";
}

// ── SSE ───────────────────────────────────────────────────────────────────
let es = null;

function connect() {
  if (es) { es.close(); es = null; }
  es = new EventSource("/stream");
  es.onopen = () => dot.classList.add("live");
  es.onerror = () => {
    dot.classList.remove("live");
    es.close(); es = null;
    setTimeout(connect, 3000);
  };
  es.onmessage = (e) => {
    try {
      const data = JSON.parse(e.data);
      if (data.type === "idle") {
        showIdle();
      } else {
        showSlide(data.title, data.image);
      }
    } catch (_) {}
  };
}

document.addEventListener("visibilitychange", () => {
  if (!document.hidden && (!es || es.readyState === EventSource.CLOSED)) {
    connect();
  }
});

connect();
</script>
</body>
</html>
